<!doctype html>
<html>
  <head>
    <title>CHD to ISO Converter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>CHD <span>&rarr;</span> ISO</h1>
        <p class="subtitle">Fast & Reliable Image Conversion</p>
      </header>

      <main>
        <div id="dropZone" class="drop-zone">
          <div class="drop-zone-content">
            <div class="icon">📁</div>
            <p>Drag & Drop <strong>.CHD</strong> files here</p>
            <span class="or">or</span>
            <button class="btn-secondary" id="browseBtn">Browse Files</button>
          </div>
        </div>

        <section class="controls">
          <div class="output-section">
            <button id="selectOutput" class="btn-outline">Select Output Folder</button>
            <p id="outputPath" class="path-display">No output folder selected</p>
          </div>
          
          <button id="startBtn" class="btn-primary" disabled>Start Conversion</button>
        </section>

        <section id="queueSection" class="queue-section">
          <h2>Conversion Queue</h2>
          <div id="queue" class="queue-list"></div>
        </section>
      </main>

      <input type="file" id="fileInput" multiple hidden accept=".chd" />
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
